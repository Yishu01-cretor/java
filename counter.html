<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Javascript</title>
</head>

<body>

  <div>
    <h1>Count:</h1>
    <h1 id="Count">0</h1>
    <button id="Inc" onClick="increment();">1+</button>
    <button id="Dec" onclick="decrement();">1-</button>
  </div>
</body>
<!-- <script src="java.js"> -->
<Script>
  // let Count = document.querySelector(".Count");
  let count = 0;
  function increment() 
  {
    count++;
     document.querySelector("#Count").innerText=count;
    
  }
  function decrement() 
  {
    count--;
    document.querySelector("#Count").innerText=count;
    
  }
</script>

</html>
